<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A comprehensive management system for vocational training centers.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="centre afaq, registre_school">
  <meta name="author" content="Fouad El Azbi">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Centre Formation Afaq</title>
  <link rel="manifest" href="manifest.json">
<script>
    // The value below is injected by flutter build, do not touch.
    const serviceWorkerVersion = "3979423606" /* Flutter's service worker is deprecated and will be removed in a future Flutter release. */;
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>
</head>
<body style="margin: 0; padding: 0; background-color: #f5f5f5;">
  <div id="loading" style="display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; flex-direction: column;">
    <img src="icons/Icon-192.png" alt="Centre Formation Afaq Logo" style="width: 100px; height: 100px; margin-bottom: 20px;">
    <div style="font-size: 24px; margin-bottom: 20px;">Loading Centre Formation Afaq...</div>
    <div style="width: 50px; height: 50px; border: 4px solid #1f77f0; border-top: 4px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
    <style>
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </div>
  <script>
    window.addEventListener('load', function(ev) {
      // Download main.dart.js
      console.log('Flutter loader starting...');
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: null,
        },
        onEntrypointLoaded: function(engineInitializer) {
          console.log('Engine initializing...');
          engineInitializer.initializeEngine().then(function(appRunner) {
            console.log('Running app...');
            document.getElementById('loading').style.display = 'none';
            appRunner.runApp();
          }).catch(function(error) {
            console.error('Failed to initialize engine:', error);
            document.getElementById('loading').innerHTML = '<pre style="color: red;">Error loading Flutter app: ' + error + '</pre>';
          });
        }
      }).catch(function(error) {
        console.error('Failed to load entrypoint:', error);
        document.getElementById('loading').innerHTML = '<pre style="color: red;">Error loading Flutter: ' + error + '</pre>';
      });
    });
    
    window.addEventListener('error', function(event) {
      console.error('Global error:', event);
    });
  </script>
</body>
</html>
